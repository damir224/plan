<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наложение планировок — сравнение квартир в реальном масштабе</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #1f2430; }
  #app { display: flex; height: 100vh; }

  /* ---- Sidebar ---- */
  #sidebar { width: 340px; flex: none; background: #fbfbfc; border-right: 1px solid #e4e6eb; overflow-y: auto; padding: 14px; }
  #sidebar h1 { font-size: 15px; margin: 0 0 2px; }
  #sidebar .sub { font-size: 11px; color: #8a909c; margin: 0 0 12px; }
  .section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #ececf0; }
  .section:last-child { border-bottom: none; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #8a909c; margin-bottom: 6px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .btn { border: 1px solid #d3d6dd; background: #fff; border-radius: 7px; padding: 7px 10px; font-size: 13px; cursor: pointer; color: #1f2430; }
  .btn:hover { background: #f0f1f4; }
  .btn.primary { background: #2f6df6; border-color: #2f6df6; color: #fff; }
  .btn.primary:hover { background: #245fe0; }
  .btn.active { background: #1f2430; border-color: #1f2430; color: #fff; }
  .btn.ghost { background: transparent; border-color: transparent; color: #8a909c; padding: 4px 6px; }
  .btn.ghost:hover { color: #d23; background: #fbeaea; }
  .btn.small { padding: 4px 7px; font-size: 12px; }
  select, input[type=number], input[type=text] { border: 1px solid #d3d6dd; border-radius: 6px; padding: 5px 7px; font-size: 13px; font-family: inherit; }

  /* apartment cards */
  .apt { border: 1px solid #e4e6eb; border-radius: 9px; padding: 9px; margin-bottom: 9px; background: #fff; }
  .apt.active { border-color: #2f6df6; box-shadow: 0 0 0 2px rgba(47,109,246,.15); }
  .apt .top { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 18px; height: 18px; border-radius: 5px; border: 1px solid rgba(0,0,0,.15); flex: none; cursor: pointer; position: relative; overflow: hidden; }
  .swatch input { position: absolute; inset: -6px; opacity: 0; cursor: pointer; }
  .apt .name { flex: 1; border: none; background: transparent; font-size: 14px; font-weight: 600; padding: 2px; min-width: 0; }
  .apt .name:focus { outline: 1px solid #d3d6dd; border-radius: 4px; }
  .apt .stats { font-size: 12px; color: #6b7280; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .apt .stats b { color: #1f2430; font-weight: 600; }
  .apt .ctrls { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #6b7280; }
  .apt .ctrls input[type=range] { flex: 1; }
  /* wall-size accordion */
  .apt details.walls { margin-top: 9px; border-top: 1px solid #eef0f3; padding-top: 8px; }
  .apt details.walls > summary { cursor: pointer; font-size: 12px; font-weight: 600; color: #2f6df6; list-style: none; user-select: none; }
  .apt details.walls > summary::-webkit-details-marker { display: none; }
  .apt details.walls > summary::before { content: "▸"; display: inline-block; width: 1em; }
  .apt details.walls[open] > summary::before { content: "▾"; }
  .wallnote { font-size: 11px; color: #8a909c; margin: 7px 0; line-height: 1.45; }
  .wallgrid { display: grid; grid-template-columns: 1fr auto; gap: 5px 8px; align-items: center; }
  .wallgrid label { font-size: 12px; color: #4b5160; }
  .wallgrid input.wlen { width: 88px; text-align: right; }
  .wallgrid .ro { font-size: 12px; color: #98a0ad; width: 88px; text-align: right; font-style: italic; }
  /* mode toolbar (3 buttons) */
  #modebar .btn { font-size: 11.5px; padding: 7px 3px; white-space: nowrap; }
  /* partitions */
  .partsec { margin-top: 9px; }
  .btn.small.addpart { width: 100%; }
  .partlist { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .partrow { display: flex; align-items: center; justify-content: space-between; gap: 6px; font-size: 12px; color: #4b5160; }
  .partrow b { font-weight: 600; color: #1f2430; }
  .partrow .rmpart { padding: 2px 6px; font-size: 12px; }
  .hint { font-size: 12px; line-height: 1.5; color: #6b7280; background: #f4f6fb; border: 1px solid #e4e9f5; border-radius: 8px; padding: 9px 11px; }
  .hint b { color: #1f2430; }
  kbd { background: #eceef2; border: 1px solid #d3d6dd; border-bottom-width: 2px; border-radius: 4px; padding: 0 5px; font-size: 11px; font-family: ui-monospace, monospace; }

  /* ---- Stage ---- */
  #stage { flex: 1; position: relative; background: #f5f6f8; overflow: hidden; min-width: 0; }
  svg { width: 100%; height: 100%; display: block; }
  #stage.draw svg { cursor: crosshair; }
  #stage.partition svg { cursor: crosshair; }
  #stage.select svg { cursor: default; }

  /* HUD */
  .hud { position: absolute; pointer-events: none; font-size: 12px; }
  #lenbar { top: 14px; left: 50%; transform: translateX(-50%); background: rgba(31,36,48,.92); color: #fff; padding: 8px 12px; border-radius: 10px; display: none; align-items: center; gap: 9px; pointer-events: auto; box-shadow: 0 4px 16px rgba(0,0,0,.18); }
  #lenbar.on { display: flex; }
  #lenbar input { width: 74px; background: #fff; color: #1f2430; border: none; border-radius: 6px; padding: 5px 7px; font-size: 14px; font-weight: 600; }
  #lenbar .muted { color: #aab2c4; }
  #scalebar { left: 16px; bottom: 16px; color: #4b5160; }
  #scalebar .bar { height: 8px; border: 2px solid #4b5160; border-top: none; margin-top: 3px; }
  #modechip { right: 16px; bottom: 16px; background: #fff; border: 1px solid #e4e6eb; padding: 6px 10px; border-radius: 20px; color: #4b5160; }
  /* [slice-4: canvas-input] free-floating length editor pinned at a wall's dimension label */
  #wallInput { position: absolute; display: none; width: 64px; transform: translate(-50%, -50%);
    background: #fff; color: #1f2430; border: 2px solid #2f6df6; border-radius: 6px;
    padding: 3px 5px; font-size: 13px; font-weight: 600; text-align: center; font-family: inherit;
    box-shadow: 0 3px 12px rgba(0,0,0,.22); z-index: 5; }
  /* [slice-8: view] zoom + fit-all controls */
  #viewctrl { right: 16px; top: 16px; display: flex; flex-direction: column; gap: 6px; pointer-events: auto; align-items: stretch; }
  #viewctrl .btn { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.12); text-align: center; }
  #viewctrl #btnZoomIn, #viewctrl #btnZoomOut { font-size: 16px; line-height: 1; padding: 5px 0; }
  #stage.spacepan svg { cursor: grab; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>Наложение планировок</h1>
    <p class="sub">Сравнение квартир в реальном масштабе</p>

    <div class="section">
      <div class="row" id="modebar">
        <button class="btn" id="btnDraw" style="flex:1">✏️ Контур</button>
        <button class="btn" id="btnPart" style="flex:1">🧱 Перегородки</button>
        <button class="btn" id="btnSelect" style="flex:1">✋ Двигать</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <div class="section">
      <div class="label">Квартиры</div>
      <div id="aptList"></div>
      <button class="btn" id="btnAdd" style="width:100%">＋ Добавить квартиру</button>
    </div>

    <div class="section">
      <div class="label">Сетка и привязка</div>
      <div class="row">
        <span style="font-size:13px;flex:1">Шаг привязки</span>
        <select id="snapSel">
          <option value="0">выкл</option>
          <option value="0.05">5 см</option>
          <option value="0.1">10 см</option>
          <option value="0.25">25 см</option>
          <option value="0.5">50 см</option>
          <option value="1">1 м</option>
        </select>
      </div>
      <div class="row"><label style="font-size:13px"><input type="checkbox" id="orthoChk"> Прямые углы (Орто)</label></div>
      <div class="row"><label style="font-size:13px"><input type="checkbox" id="labelChk"> Подписи длин у всех</label></div>
    </div>

    <div class="section">
      <div class="label">Данные</div>
      <div class="row">
        <button class="btn small" id="btnExample" title="Загрузить три планировки по умолчанию">3 планировки</button>
        <button class="btn small" id="btnExport">Экспорт</button>
        <button class="btn small" id="btnImport">Импорт</button>
        <button class="btn small" id="btnClear" style="margin-left:auto;color:#d23">Очистить</button>
      </div>
      <input type="file" id="fileIn" accept="application/json" style="display:none">
      <p class="sub" style="margin:8px 0 0">Сохраняется автоматически в браузере.</p>
    </div>
  </div>

  <div id="stage" class="draw">
    <svg id="svg"></svg>
    <div class="hud" id="lenbar">
      <span class="muted">Длина стены</span>
      <input type="text" id="lenInput" inputmode="decimal" autocomplete="off">
      <span class="muted">м · <kbd>Enter</kbd> поставить</span>
    </div>
    <div class="hud" id="scalebar"><span id="scaleLbl"></span><div class="bar" id="scaleBarEl"></div></div>
    <div class="hud" id="modechip"></div>
    <input type="text" id="wallInput" inputmode="decimal" autocomplete="off"><!-- [slice-4: canvas-input] -->
    <!-- [slice-8: view] zoom + fit-all HUD controls -->
    <div class="hud" id="viewctrl">
      <button class="btn small" id="btnZoomIn" title="Приблизить">＋</button>
      <button class="btn small" id="btnZoomOut" title="Отдалить">−</button>
      <button class="btn small" id="btnFit" title="Вписать всё">Вписать</button>
    </div>
  </div>
</div>

<script>
"use strict";
// ============================== helpers ==============================
const SVGNS = "http://www.w3.org/2000/svg";
function el(tag, attrs){ const e = document.createElementNS(SVGNS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
function txt(x, y, s, fill, size, anchor){
  const t = el("text", { x, y, fill, "font-size": size, "font-family": "system-ui, sans-serif",
    "text-anchor": anchor || "start", "paint-order": "stroke", stroke: "#fff", "stroke-width": 3, "stroke-linejoin": "round" });
  t.textContent = s; return t;
}
function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function centroid(pts){ if (!pts.length) return {x:0,y:0}; let x=0,y=0; for (const p of pts){ x+=p.x; y+=p.y; } return {x:x/pts.length, y:y/pts.length}; }
function polyArea(pts){ let s=0; const n=pts.length; for (let i=0;i<n;i++){ const a=pts[i], b=pts[(i+1)%n]; s += a.x*b.y - b.x*a.y; } return Math.abs(s)/2; }
function polyPerim(pts, closed){ const n=pts.length; if (n<2) return 0; let s=0; const m = closed? n : n-1; for (let i=0;i<m;i++){ s += dist(pts[i], pts[(i+1)%n]); } return s; }
function pointInPoly(p, pts){ let inside=false; for (let i=0,j=pts.length-1;i<pts.length;j=i++){ const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y; if (((yi>p.y)!==(yj>p.y)) && (p.x < (xj-xi)*(p.y-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }
function fmt(n){ const s = n < 0 ? -1 : 1; const r = s * Math.round(Math.abs(n)*100 + 1e-6) / 100; return (Object.is(r,-0)?0:r).toString(); }  // [slice-2: precision] round-half-up at 0.01 (sign-aware ε defeats 100.4999… float trap)
function niceStep(m){ const a=[0.1,0.2,0.25,0.5,1,2,2.5,5,10,20,25,50,100]; for (const s of a) if (s>=m) return s; return 200; }

// ============================== state ==============================
const PALETTE = ["#e8453c","#2f6df6","#1ea672","#f5a623","#9b51e0","#00a3b4","#d6308a"];
const KEY = "plann_overlay_v1";
let idc = 0;
const state = {
  scale: 46, panX: 0, panY: 0,          // screen_px = world_m * scale + pan
  gridSnap: 0.1, ortho: true, showAll: false,
  mode: "draw",                          // "draw" | "select"
  apartments: [],                        // {id,name,color,visible,opacity,points:[{x,y}],closed,tx,ty,rot}
  activeId: null,
};
// transient (not saved)
let cursor = { x: 0, y: 0 };             // svg-screen coords
let shiftHeld = false;
let altHeld = false;                     // [slice-3: snap] Alt suppresses line+grid snapping
// [slice-3: snap] transient snap state for the partition vertex being drawn (one-shot, never stored on the point):
// { host:{kind:'wall'|'part', seg:[A,B] in LOCAL}, point:{x,y} LOCAL, offsetLeft, offsetRight } | null
let partSnap = null;
let spaceHeld = false;                    // [slice-8: view] holding Space = pan in any mode
let drag = null;                         // {type, ...}
let editWall = null;                     // {id, k} — wall highlighted / being edited
let wallInput = null;                     // [slice-4: canvas-input] {id, k} — wall whose on-canvas length input is open (null = closed)
const openWalls = new Set();             // apartment ids whose "Размеры стен" accordion is open
let partDraft = null;                    // {aptId, points:[local]} — interior partition being drawn
let lenInputDirty = false;               // [slice-2: precision] true once the user edits #lenInput; cleared on every auto-fill

// [slice-6: undo] memory-only history of apartment-data snapshots (NOT persisted; storage schema unchanged)
const UNDO_CAP = 50;                      // [slice-6: undo] stack depth ~50
const undoStack = [];                     // [slice-6: undo] snapshots before each data mutation
const redoStack = [];                     // [slice-6: undo] snapshots undone, available to redo
let gesturePending = null;               // [slice-6: undo] pre-gesture snapshot held during a drag/slider/name session
function snapshot(){                       // [slice-6: undo] deep clone of apartment DATA + active selection + id counter
  return JSON.stringify({ apartments: state.apartments, activeId: state.activeId, idc });
}
function restoreSnapshot(s){               // [slice-6: undo] apply a snapshot back into live state
  const d = JSON.parse(s);
  state.apartments = d.apartments; state.activeId = d.activeId; idc = d.idc;
}
function pushUndo(){                       // [slice-6: undo] record CURRENT state before a mutation; new edit clears redo
  undoStack.push(snapshot());
  if (undoStack.length > UNDO_CAP) undoStack.shift();
  redoStack.length = 0;
}
function undo(){                           // [slice-6: undo] restore previous data snapshot
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  restoreSnapshot(undoStack.pop());
  if (editWall && !state.apartments.some(a => a.id === editWall.id)) editWall = null;
  partDraft = null;
  renderSidebar(); commit();
}
function redo(){                           // [slice-6: undo] re-apply an undone data snapshot
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  restoreSnapshot(redoStack.pop());
  if (editWall && !state.apartments.some(a => a.id === editWall.id)) editWall = null;
  partDraft = null;
  renderSidebar(); commit();
}
// [slice-6: undo] gesture coalescing: capture once at gesture START, push once at END if data changed
function beginGesture(){ gesturePending = snapshot(); }
function commitGesture(){ if (gesturePending !== null && gesturePending !== snapshot()){ undoStack.push(gesturePending); if (undoStack.length > UNDO_CAP) undoStack.shift(); redoStack.length = 0; } gesturePending = null; }

const stage = document.getElementById("stage");
const svg = document.getElementById("svg");

// ============================== coordinate pipeline ==============================
// local(m) -> world(m): rotate around the polygon centroid, then translate by (tx,ty)
function localToWorld(a, p){
  const c = centroid(a.points), rad = a.rot * Math.PI/180;
  const dx = p.x - c.x, dy = p.y - c.y;
  return { x: dx*Math.cos(rad) - dy*Math.sin(rad) + c.x + a.tx,
           y: dx*Math.sin(rad) + dy*Math.cos(rad) + c.y + a.ty };
}
function worldToLocal(a, w){
  const c = centroid(a.points), rad = -a.rot * Math.PI/180;
  const dx = w.x - c.x - a.tx, dy = w.y - c.y - a.ty;
  return { x: dx*Math.cos(rad) - dy*Math.sin(rad) + c.x,
           y: dx*Math.sin(rad) + dy*Math.cos(rad) + c.y };
}
function worldToScreen(w){ return { x: w.x*state.scale + state.panX, y: w.y*state.scale + state.panY }; }
function screenToWorld(s){ return { x: (s.x - state.panX)/state.scale, y: (s.y - state.panY)/state.scale }; }
function snapWorld(w){ const g = state.gridSnap; if (!g) return w; return { x: Math.round(w.x/g)*g, y: Math.round(w.y/g)*g }; }

function activeApt(){ return state.apartments.find(a => a.id === state.activeId) || null; }

// world point of the cursor while drawing, with ortho + grid snap applied
function drawWorld(){
  let w = screenToWorld(cursor);
  const a = activeApt();
  const ortho = state.ortho !== shiftHeld;   // Shift inverts
  if (a && a.points.length && ortho && !a.closed){
    const last = a.points[a.points.length-1]; // active is identity transform while drawing
    if (Math.abs(w.x-last.x) >= Math.abs(w.y-last.y)) w = { x:w.x, y:last.y };
    else w = { x:last.x, y:w.y };
  }
  return snapWorld(w);
}

// ============================== persistence ==============================
let saveTimer = null;
function save(){ clearTimeout(saveTimer); saveTimer = setTimeout(() => {
  try { localStorage.setItem(KEY, JSON.stringify({ scale:state.scale, panX:state.panX, panY:state.panY,
    gridSnap:state.gridSnap, ortho:state.ortho, showAll:state.showAll, mode:state.mode,
    apartments:state.apartments, activeId:state.activeId, idc })); } catch(e){}
}, 250); }
function load(){
  try {
    const raw = localStorage.getItem(KEY); if (!raw) return false;
    const d = JSON.parse(raw); Object.assign(state, {
      scale:d.scale, panX:d.panX, panY:d.panY, gridSnap:d.gridSnap, ortho:d.ortho,
      showAll:!!d.showAll, mode:d.mode||"select", apartments:d.apartments||[], activeId:d.activeId });
    idc = d.idc || state.apartments.length;
    return state.apartments.length > 0;
  } catch(e){ return false; }
}

// ============================== rendering ==============================
let raf = null;
function scheduleRender(){ if (raf) return; raf = requestAnimationFrame(() => { raf = null; render(); }); }

function render(){
  const W = stage.clientWidth, H = stage.clientHeight;
  svg.setAttribute("width", W); svg.setAttribute("height", H);
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  drawGrid(W, H);
  for (const a of state.apartments) if (a.visible){ drawApartment(a); drawPartitions(a); }
  if (state.mode === "draw") drawRubber();
  if (state.mode === "partition") drawPartDraft();
  drawHandles();
  updateHud(W, H);
  updateStats();
  repositionCanvasInput();   // [slice-4: canvas-input] keep an open length input pinned to its wall under pan/zoom/move
}

// [slice-4: canvas-input] re-pin the open on-canvas input to its wall's label; close if the wall is gone
function repositionCanvasInput(){
  if (!wallInput) return;
  const a = state.apartments.find(x => x.id === wallInput.id);
  if (!a || !a.closed || wallInput.k >= a.points.length - 1){ if (canvasInputHandlers) canvasInputHandlers.cancel(); return; }
  const mid = wallLabelScreen(a, wallInput.k);
  wallInputEl.style.left = mid.x + "px";
  wallInputEl.style.top  = mid.y + "px";
}

function drawGrid(W, H){
  const step = niceStep(72 / state.scale);
  const tl = screenToWorld({x:0,y:0}), br = screenToWorld({x:W,y:H});
  const g = el("g", {});
  for (let x = Math.floor(tl.x/step)*step; x <= br.x + 1e-9; x += step){
    const sx = x*state.scale + state.panX;
    const major = Math.round(x/step) % 5 === 0;
    g.appendChild(el("line", { x1:sx, y1:0, x2:sx, y2:H, stroke: major? "#cfd3da":"#e7e9ee", "stroke-width":1 }));
    if (major) g.appendChild(txt(sx+3, 13, fmt(x)+" м", "#aab0bb", 10));
  }
  for (let y = Math.floor(tl.y/step)*step; y <= br.y + 1e-9; y += step){
    const sy = y*state.scale + state.panY;
    const major = Math.round(y/step) % 5 === 0;
    g.appendChild(el("line", { x1:0, y1:sy, x2:W, y2:sy, stroke: major? "#cfd3da":"#e7e9ee", "stroke-width":1 }));
    if (major) g.appendChild(txt(3, sy-3, fmt(y)+" м", "#aab0bb", 10));
  }
  svg.appendChild(g);
}

function lenBadge(x, y, s, color){
  const g = el("g", {});
  g.appendChild(txt(x, y, s, color, 12, "middle"));
  g.lastChild.setAttribute("dominant-baseline", "middle");
  g.lastChild.setAttribute("font-weight", "600");
  return g;
}

function drawApartment(a){
  const n = a.points.length;
  if (!n) return;
  const scr = a.points.map(p => worldToScreen(localToWorld(a, p)));
  const isA = a.id === state.activeId;
  const m = a.closed ? n : n - 1;        // number of wall segments
  // fill (closed only)
  if (a.closed && n >= 3){
    const d = scr.map((p,i)=> (i? "L":"M") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ") + " Z";
    svg.appendChild(el("path", { d, fill: a.color, "fill-opacity": a.opacity, stroke: "none" }));
  }
  // walls, one line each — the closing wall is dashed on the active apartment (it's the auto-derived one)
  for (let i=0;i<m;i++){
    const p1 = scr[i], p2 = scr[(i+1)%n];
    const closing = a.closed && i === n-1;
    const at = { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, stroke:a.color,
      "stroke-width": isA?3.5:2.5, "stroke-linecap":"round", "stroke-linejoin":"round" };
    if (closing && isA) at["stroke-dasharray"] = "7 5";
    svg.appendChild(el("line", at));
  }
  // highlight the wall being edited
  if (editWall && editWall.id === a.id){
    const p1 = scr[editWall.k], p2 = scr[(editWall.k+1)%n];
    if (p1 && p2){
      svg.appendChild(el("line", { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, stroke:"#fff", "stroke-width":8, "stroke-linecap":"round", opacity:.85 }));
      svg.appendChild(el("line", { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, stroke:a.color, "stroke-width":4, "stroke-linecap":"round" }));
    }
  }
  // wall length labels
  if ((isA || state.showAll) && n >= 2){
    for (let i=0;i<m;i++){
      const len = dist(a.points[i], a.points[(i+1)%n]);
      const mid = { x:(scr[i].x+scr[(i+1)%n].x)/2, y:(scr[i].y+scr[(i+1)%n].y)/2 };
      svg.appendChild(lenBadge(mid.x, mid.y, fmt(len)+" м", a.color));
    }
  }
  // "авто" tag on the active apartment's closing (derived) wall
  if (isA && a.closed && n >= 3){
    const mid = { x:(scr[n-1].x+scr[0].x)/2, y:(scr[n-1].y+scr[0].y)/2 };
    const t = txt(mid.x, mid.y + 14, "авто", "#9aa0aa", 10, "middle");
    t.setAttribute("dominant-baseline", "middle"); svg.appendChild(t);
  }
  // vertices of active
  if (isA) for (const p of scr) svg.appendChild(el("circle", { cx:p.x, cy:p.y, r:4, fill:"#fff", stroke:a.color, "stroke-width":2 }));
}

function partLen(part){ let s=0; for (let i=0;i<part.points.length-1;i++) s += dist(part.points[i], part.points[i+1]); return s; }

// interior partitions, transformed by the apartment (so they move/rotate with the overlay)
function drawPartitions(a){
  const parts = a.partitions || []; if (!parts.length) return;
  const isA = a.id === state.activeId;
  for (const part of parts){
    const scr = part.points.map(p => worldToScreen(localToWorld(a, p)));
    for (let i=0;i<scr.length-1;i++)
      svg.appendChild(el("line", { x1:scr[i].x, y1:scr[i].y, x2:scr[i+1].x, y2:scr[i+1].y, stroke:a.color, "stroke-width": isA?2.5:2, "stroke-linecap":"round", "stroke-linejoin":"round" }));
    if (isA || state.showAll)
      for (let i=0;i<scr.length-1;i++)
        svg.appendChild(lenBadge((scr[i].x+scr[i+1].x)/2, (scr[i].y+scr[i+1].y)/2, fmt(dist(part.points[i], part.points[i+1]))+" м", a.color));
    if (isA) for (const p of scr) svg.appendChild(el("circle", { cx:p.x, cy:p.y, r:3, fill:"#fff", stroke:a.color, "stroke-width":1.5 }));
  }
}

function drawPartDraft(){
  if (!partDraft) return;
  const a = state.apartments.find(x => x.id === partDraft.aptId); if (!a) return;
  const scr = partDraft.points.map(p => worldToScreen(localToWorld(a, p)));
  for (let i=0;i<scr.length-1;i++)
    svg.appendChild(el("line", { x1:scr[i].x, y1:scr[i].y, x2:scr[i+1].x, y2:scr[i+1].y, stroke:a.color, "stroke-width":2.5, "stroke-linecap":"round" }));
  for (const p of scr) svg.appendChild(el("circle", { cx:p.x, cy:p.y, r:3, fill:a.color }));
  // [slice-3: snap] compute the preview point once (also refreshes partSnap), then draw rubber band (if a prev point exists)
  const curL = partDrawPoint(), curS = worldToScreen(localToWorld(a, curL));   // [slice-3: snap]
  if (partDraft.points.length){
    const lastL = partDraft.points[partDraft.points.length-1];
    const last = worldToScreen(localToWorld(a, lastL));
    svg.appendChild(el("line", { x1:last.x, y1:last.y, x2:curS.x, y2:curS.y, stroke:a.color, "stroke-width":2, "stroke-dasharray":"6 5", opacity:.8 }));
    svg.appendChild(el("circle", { cx:curS.x, cy:curS.y, r:3, fill:a.color }));
    svg.appendChild(lenBadge((last.x+curS.x)/2, (last.y+curS.y)/2 - 10, fmt(dist(lastL, curL))+" м", a.color));
    if (document.activeElement !== lenInput){ lenInput.value = fmt(dist(lastL, curL)); lenInputDirty = false; }  // [slice-2: precision]
  }
  if (partSnap) drawSnapIndicator(a, curS);   // [slice-3: snap] host-line highlight + point marker + offsets
}

// [slice-3: snap] indicator for an active partition snap: highlight the host line, mark the snapped point, label both offsets.
function drawSnapIndicator(a, curS){
  const A = worldToScreen(localToWorld(a, partSnap.host.seg[0]));
  const B = worldToScreen(localToWorld(a, partSnap.host.seg[1]));
  svg.appendChild(el("line", { x1:A.x, y1:A.y, x2:B.x, y2:B.y, stroke:"#1f2430", "stroke-width":2, "stroke-dasharray":"2 4", opacity:.55 }));  // host-line highlight
  svg.appendChild(el("circle", { cx:curS.x, cy:curS.y, r:6, fill:"none", stroke:"#1f2430", "stroke-width":2 }));   // snapped-point marker
  // offset labels positioned a bit off the midpoints of each half of the host segment, toward each end
  const midL = { x:(curS.x+A.x)/2, y:(curS.y+A.y)/2 - 9 }, midR = { x:(curS.x+B.x)/2, y:(curS.y+B.y)/2 - 9 };
  if (partSnap.offsetLeft  > 0.005) svg.appendChild(lenBadge(midL.x, midL.y, fmt(partSnap.offsetLeft)+" м",  "#1f2430"));
  if (partSnap.offsetRight > 0.005) svg.appendChild(lenBadge(midR.x, midR.y, fmt(partSnap.offsetRight)+" м", "#1f2430"));
}

function drawRubber(){
  const a = activeApt();
  if (!a || a.closed || !a.points.length) return;
  const last = worldToScreen(a.points[a.points.length-1]);
  const cur = drawWorld(), curS = worldToScreen(cur);
  svg.appendChild(el("line", { x1:last.x, y1:last.y, x2:curS.x, y2:curS.y, stroke:a.color, "stroke-width":2, "stroke-dasharray":"6 5", opacity:.85 }));
  svg.appendChild(el("circle", { cx:curS.x, cy:curS.y, r:4, fill:a.color }));
  const len = dist(a.points[a.points.length-1], cur);
  svg.appendChild(lenBadge((last.x+curS.x)/2, (last.y+curS.y)/2 - 10, fmt(len)+" м", a.color));
  // close hint — same ortho-independent screen test as placePoint
  if (a.points.length >= 3){
    const first = worldToScreen(a.points[0]);
    if (dist(cursor, first) < 14) svg.appendChild(el("circle", { cx:first.x, cy:first.y, r:8, fill:"none", stroke:a.color, "stroke-width":2 }));
  }
  // live length field
  if (document.activeElement !== lenInput){ lenInput.value = fmt(len); lenInputDirty = false; }  // [slice-2: precision]
}

function drawHandles(){
  const a = activeApt();
  if (state.mode !== "select" || !a || a.points.length < 2) return;
  const c = worldToScreen(localToWorld(a, centroid(a.points)));
  svg.appendChild(el("line", { x1:c.x-7, y1:c.y, x2:c.x+7, y2:c.y, stroke:a.color, "stroke-width":1.5 }));
  svg.appendChild(el("line", { x1:c.x, y1:c.y-7, x2:c.x, y2:c.y+7, stroke:a.color, "stroke-width":1.5 }));
}

const lenInput = document.getElementById("lenInput");
const lenbar = document.getElementById("lenbar");
function updateHud(W, H){

    state.mode === "draw" ? "Режим: контур" : state.mode === "partition" ? "Режим: перегородки" : "Режим: перемещение";
  // length bar visible while drawing a footprint or a partition

  const drawingPart = state.mode === "partition" && partDraft && partDraft.points.length >= 1;
  lenbar.classList.toggle("on", drawingFoot || drawingPart);

}

// ============================== sidebar ==============================
const aptList = document.getElementById("aptList");

function wallLen(a, i){ const n = a.points.length; return dist(a.points[i], a.points[(i+1)%n]); }
function wallsAccordionHTML(a){
  if (!a.closed || a.points.length < 3) return "";
  const n = a.points.length; let rows = "";
  for (let i=0;i<n;i++){
    if (i === n-1)  // closing wall — derived, read-only
      rows += `<label>Стена ${i+1} <span style="color:#aeb3bd">(замык.)</span></label><span class="ro" data-w="${i}">${fmt(wallLen(a,i))} м</span>`;
    else
      rows += `<label>Стена ${i+1}</label><input type="number" class="wlen" data-w="${i}" step="0.01" min="0.1" value="${fmt(wallLen(a,i))}">`;
  }
  return `<details class="walls"${openWalls.has(a.id)?" open":""}>
      <summary>Размеры стен (${n})</summary>
      <div class="wallnote">Длина стены в метрах. Последняя (<i>замыкающая</i>) стена подгоняется сама, чтобы контур остался замкнутым — на холсте она показана пунктиром с меткой «авто».</div>
      <div class="wallgrid">${rows}</div>
    </details>`;
}
function partsBlockHTML(a){
  if (!a.closed || a.points.length < 3) return "";
  const parts = a.partitions || [];
  let rows = "";
  parts.forEach((p,i)=>{ rows += `<div class="partrow"><span>Перегородка ${i+1} · <b>${fmt(partLen(p))} м</b></span><button class="btn ghost rmpart" data-i="${i}" title="Удалить">✕</button></div>`; });
  return `<div class="partsec">
      <button class="btn small addpart">＋ Перегородка</button>
      ${parts.length ? `<div class="partlist">${rows}</div>` : ""}
    </div>`;
}

function renderSidebar(){
  aptList.innerHTML = "";
  if (!state.apartments.length){
    aptList.innerHTML = '<p class="sub" style="margin:0 0 8px">Пока пусто. Нажмите «Рисовать стены» и кликайте по сетке.</p>';
  }
  state.apartments.forEach(a => {
    const card = document.createElement("div");
    card.className = "apt" + (a.id === state.activeId ? " active" : "");
    card.innerHTML = `
      <div class="top">
        <span class="swatch" style="background:${a.color}"><input type="color" value="${a.color}"></span>
        <input class="name" value="${a.name.replace(/"/g,'&quot;')}">
        <input type="checkbox" class="vis" ${a.visible?"checked":""} title="Видимость">
        <button class="btn ghost del" title="Удалить">✕</button>
      </div>
      <div class="stats"><span>Площадь: <b class="area">—</b></span><span>Периметр: <b class="peri">—</b></span><span class="open" style="color:#e8a23c"></span></div>
      <div class="ctrls">↻ <input type="range" class="rot" min="-180" max="180" step="1" value="${a.rot}">
        <input type="number" class="rotn" value="${a.rot}" step="1" style="width:56px">°</div>
      <div class="ctrls">◐ <input type="range" class="op" min="0.05" max="0.8" step="0.05" value="${a.opacity}"></div>
      ${wallsAccordionHTML(a)}
      ${partsBlockHTML(a)}`;
    // select on card click (ignore clicks inside controls / accordions / partition section)
    card.addEventListener("mousedown", e => { if (e.target.closest("input,button,summary,.walls,.partsec")) return; selectApt(a.id); });
    const sw = card.querySelector(".swatch input");
    sw.addEventListener("focus", beginGesture);   // [slice-6: undo] color pick = one step (begin on picker open)
    sw.addEventListener("change", commitGesture); // [slice-6: undo] commit on picker close (fires on original even after rebuild)
    sw.addEventListener("input", e => { a.color = e.target.value; commit(); renderSidebar(); });
    const nm = card.querySelector(".name");
    nm.addEventListener("focus", beginGesture);   // [slice-6: undo] name typing = one step
    nm.addEventListener("blur", commitGesture);   // [slice-6: undo]
    nm.addEventListener("input", e => { a.name = e.target.value; save(); });
    card.querySelector(".vis").addEventListener("change", e => { pushUndo(); a.visible = e.target.checked; commit(); });  // [slice-6: undo] discrete
    card.querySelector(".del").addEventListener("click", () => removeApt(a.id));
    const rot = card.querySelector(".rot"), rotn = card.querySelector(".rotn");
    rot.addEventListener("focus", beginGesture);  // [slice-6: undo] rotation drag = one step
    rot.addEventListener("change", commitGesture);// [slice-6: undo] range fires change on release
    rot.addEventListener("input", e => { a.rot = +e.target.value; rotn.value = a.rot; commit(); });
    rotn.addEventListener("focus", beginGesture);  // [slice-6: undo] typing rotation = one step
    rotn.addEventListener("blur", commitGesture);  // [slice-6: undo]
    rotn.addEventListener("input", e => { a.rot = +e.target.value||0; rot.value = a.rot; commit(); });
    const op = card.querySelector(".op");
    op.addEventListener("focus", beginGesture);   // [slice-6: undo] opacity drag = one step
    op.addEventListener("change", commitGesture); // [slice-6: undo]
    op.addEventListener("input", e => { a.opacity = +e.target.value; commit(); });
    // walls accordion wiring
    const det = card.querySelector("details.walls");
    if (det){
      det.addEventListener("toggle", () => { if (det.open) openWalls.add(a.id); else openWalls.delete(a.id); });
      card.querySelectorAll("input.wlen").forEach(inp => {
        const k = +inp.dataset.w;
        inp.addEventListener("focus", () => { editWall = { id:a.id, k }; scheduleRender(); });
        inp.addEventListener("blur",  () => { if (editWall && editWall.id===a.id && editWall.k===k){ editWall = null; scheduleRender(); } });
        inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
        inp.addEventListener("change", () => {
          const v = parseFloat(inp.value.replace(",", "."));
          beginGesture();                                       // [slice-6: undo] snapshot before length edit
          if (setWallLength(a, k, v)){ commit(); syncWalls(a); }
          else inp.value = fmt(wallLen(a, k));
          commitGesture();                                      // [slice-6: undo] pushes only if geometry changed
        });
      });
    }
    // partitions wiring
    const addp = card.querySelector(".addpart");
    if (addp) addp.addEventListener("click", () => startPartition(a.id));
    card.querySelectorAll(".rmpart").forEach(b => b.addEventListener("click", () => removePartition(a.id, +b.dataset.i)));
    aptList.appendChild(card);
  });
  updateStats();
}
function updateStats(){
  // rows are in the same order as state.apartments
  [...aptList.querySelectorAll(".apt")].forEach((card, i) => {
    const a = state.apartments[i]; if (!a) return;
    const area = card.querySelector(".area"), peri = card.querySelector(".peri"), open = card.querySelector(".open");
    if (area) area.textContent = a.closed ? fmt(polyArea(a.points)) + " м²" : "—";
    if (peri) peri.textContent = fmt(polyPerim(a.points, a.closed)) + " м";
    if (open) open.textContent = a.closed ? "" : "контур не замкнут";
  });
}

// set wall k (0..n-2) to exact length L by rigidly shifting the tail (k+1..n-1).
// All other walls keep their length+angle; the closing wall (n-1 -> 0) re-closes the loop.
function setWallLength(a, k, L){
  const n = a.points.length;
  if (!(L > 0) || k < 0 || k >= n-1) return false;     // closing wall is derived, not editable
  const p0 = a.points[k], p1 = a.points[k+1];
  let dx = p1.x - p0.x, dy = p1.y - p0.y, d = Math.hypot(dx, dy);
  if (d < 1e-9) return false;                            // zero-length wall: no direction to extend
  const c0 = a.rot ? centroid(a.points) : null;          // pin the rotation pivot if rotated
  const ddx = (p0.x + dx/d*L) - p1.x, ddy = (p0.y + dy/d*L) - p1.y;
  for (let i = k+1; i < n; i++) a.points[i] = { x: +(a.points[i].x+ddx).toFixed(4), y: +(a.points[i].y+ddy).toFixed(4) };
  if (c0){ const c1 = centroid(a.points); a.tx += c0.x - c1.x; a.ty += c0.y - c1.y; }   // keep world-centroid fixed
  return true;
}
// refresh one card's wall fields + closing length + stats in place (no rebuild → keeps focus/open state)
function syncWalls(a){
  const card = [...aptList.querySelectorAll(".apt")][state.apartments.indexOf(a)]; if (!card) return;
  card.querySelectorAll("input.wlen").forEach(inp => { if (document.activeElement !== inp) inp.value = fmt(wallLen(a, +inp.dataset.w)); });
  const ro = card.querySelector(".wallgrid .ro"); if (ro) ro.textContent = fmt(wallLen(a, +ro.dataset.w)) + " м";
  updateStats();
}

// ============================== apartment ops ==============================
function newApt(){
  const color = PALETTE[state.apartments.length % PALETTE.length];
  return { id: "a"+(++idc), name: "Квартира "+(state.apartments.length+1), color,
    visible: true, opacity: state.apartments.length ? 0.28 : 0.32, points: [], closed: false, tx: 0, ty: 0, rot: 0, partitions: [] };
}
function addApt(){ pushUndo(); const a = newApt(); state.apartments.push(a); state.activeId = a.id; setMode("draw"); commit(); renderSidebar(); }  // [slice-6: undo] push BEFORE newApt() (it ++idc)
function removeApt(id){ pushUndo(); state.apartments = state.apartments.filter(a => a.id !== id); if (state.activeId === id) state.activeId = state.apartments.length ? state.apartments[state.apartments.length-1].id : null; commit(); renderSidebar(); }  // [slice-6: undo]
function selectApt(id){ commitDraft(); if (editWall && editWall.id !== id) editWall = null; state.activeId = id; commit(); renderSidebar(); }

function commit(){ save(); scheduleRender(); }

function setMode(m){
  if (wallInput && canvasInputHandlers) canvasInputHandlers.cancel();   // [slice-4: canvas-input] drop a floating editor on mode change
  let committed = false;
  if (state.mode === "partition" && m !== "partition"){ committed = !!(partDraft && partDraft.points.length >= 2); commitDraft(); }
  lenInputDirty = false;   // [slice-2: precision] don't carry an edit across modes
  state.mode = m;
  stage.className = m;
  document.getElementById("btnDraw").classList.toggle("active", m === "draw");
  document.getElementById("btnPart").classList.toggle("active", m === "partition");
  document.getElementById("btnSelect").classList.toggle("active", m === "select");
  setHint();
  if (committed) renderSidebar();
  commit();
}
function startDrawing(){
  const a = activeApt();
  if (!a || a.closed) { addApt(); return; }   // addApt already sets draw mode
  setMode("draw");
}
function setHint(){
  const h = document.getElementById("hint");
  if (state.mode === "draw"){
    h.innerHTML = "Кликайте по сетке — ставьте углы <b>контура</b> квартиры. Длина стены видна сразу; точную можно ввести в поле сверху и нажать <kbd>Enter</kbd>. <b>Замкнуть</b>: клик по первой точке или <kbd>Enter</kbd>. <kbd>Esc</kbd> — убрать последнюю. <kbd>Shift</kbd> — временно снять Орто.";
  } else if (state.mode === "partition"){
    const a = activeApt();
    if (!a || !a.closed) h.innerHTML = "Сначала нарисуйте <b>контур</b> квартиры (кнопка «Контур»), затем добавляйте перегородки внутри.";
    else h.innerHTML = "Кликайте внутри активной квартиры — рисуйте <b>перегородку</b>. Точную длину — в поле сверху. Вершина <b>прилипает</b> к стенам и перегородкам своей квартиры (видны отступы до концов линии); <kbd>Alt</kbd> — без прилипания. <b>Готово</b>: <kbd>Enter</kbd> или двойной клик. <kbd>Esc</kbd> — убрать точку. Затем можно начать следующую.";
  } else {
    h.innerHTML = "Клик по квартире — выбрать; <b>тащить</b> — двигать; <b>↻</b> — вращать; стрелки — сдвиг. <b>Клик по стене</b> (или аккордеон «Размеры стен») задаёт её длину. Перегородки — кнопка «＋ Перегородка» в карточке. Колесо — масштаб.";
  }
}

// ============================== drawing actions ==============================
function placePoint(w){
  const a = activeApt(); if (!a || a.closed) return;
  // close when clicking near the first vertex — tested in screen space so Ortho can't pull it off target
  if (a.points.length >= 3 && dist(cursor, worldToScreen(a.points[0])) < 12){ closePoly(); return; }
  // drop a point landing on top of the previous one (also swallows the 2nd click of a dbl-click-to-close)
  if (a.points.length && dist(cursor, worldToScreen(a.points[a.points.length-1])) < 6) return;
  a.points.push({ x: +w.x.toFixed(4), y: +w.y.toFixed(4) });
  commit();
}
// [slice-2: precision] exact length the footprint rubber band currently represents (last point → live cursor)
function drawExactRubberLen(){
  const a = activeApt(); if (!a || a.closed || !a.points.length) return 0;
  return dist(a.points[a.points.length-1], drawWorld());
}
function placeExactLength(L){
  const a = activeApt(); if (!a || a.closed || !a.points.length || !(L>0)) return;
  const last = a.points[a.points.length-1];
  const cur = drawWorld();
  let dx = cur.x - last.x, dy = cur.y - last.y, d = Math.hypot(dx, dy);
  if (d < 1e-9){ dx = 1; dy = 0; d = 1; }              // default direction: +x
  a.points.push({ x: +(last.x + dx/d*L).toFixed(4), y: +(last.y + dy/d*L).toFixed(4) });
  commit();
}
function closePoly(){ const a = activeApt(); if (!a || a.points.length < 3) return; a.closed = true; setMode("select"); commit(); renderSidebar(); }
function undoPoint(){ const a = activeApt(); if (!a || a.closed) return; a.points.pop(); commit(); }

// ----- interior partitions (drawn in the apartment's LOCAL space, so they move/rotate with it) -----
// [slice-3: snap] nearest point on a LOCAL segment [A,B] to local point p (foot clamped to the segment).
// Returns { foot:{x,y}, t (0..1 clamped), distLocal, len } — all in LOCAL metres.
function segNearestLocal(p, A, B){
  const vx = B.x-A.x, vy = B.y-A.y, len2 = vx*vx + vy*vy;
  let t = len2 < 1e-12 ? 0 : ((p.x-A.x)*vx + (p.y-A.y)*vy) / len2;
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  const foot = { x: A.x + t*vx, y: A.y + t*vy };
  return { foot, t, distLocal: Math.hypot(p.x-foot.x, p.y-foot.y), len: Math.sqrt(len2) };
}
// [slice-3: snap] find the best host-line snap for a LOCAL cursor point on the ACTIVE apartment ONLY.
// Candidates: footprint walls (closed loop, all n segments) + each existing partition's segments. Never other apartments,
// never the footprint draft (footprint is already closed in partition mode). Priority: segment endpoint (corner) > segment line.
// Thresholds are screen px converted to local via state.scale (stable under zoom). Returns partSnap shape or null.
function findPartSnap(a, p){
  if (!a || !a.closed || a.points.length < 3) return null;
  const cornerL = 12 / state.scale, lineL = 8 / state.scale;   // px → local metres
  const segs = [];
  const n = a.points.length;
  for (let i=0;i<n;i++) segs.push({ kind:"wall", A:a.points[i], B:a.points[(i+1)%n] });   // footprint: closed loop, all n walls
  for (const part of (a.partitions || []))
    for (let i=0;i<part.points.length-1;i++) segs.push({ kind:"part", A:part.points[i], B:part.points[i+1] });
  let bestCorner = null, bestLine = null;
  for (const s of segs){
    const nr = segNearestLocal(p, s.A, s.B);
    // corner: cursor near a segment endpoint (compare distance to the nearer end against the corner threshold)
    const dA = Math.hypot(p.x-s.A.x, p.y-s.A.y), dB = Math.hypot(p.x-s.B.x, p.y-s.B.y);
    const endNear = dA <= dB ? s.A : s.B, endDist = Math.min(dA, dB);
    if (endDist <= cornerL && (!bestCorner || endDist < bestCorner.d))
      bestCorner = { d:endDist, kind:s.kind, seg:[s.A, s.B], point:{ x:endNear.x, y:endNear.y } };
    if (nr.distLocal <= lineL && (!bestLine || nr.distLocal < bestLine.d))
      bestLine = { d:nr.distLocal, kind:s.kind, seg:[s.A, s.B], point:nr.foot };
  }
  const hit = bestCorner || bestLine;   // corner wins over line
  if (!hit) return null;
  const A = hit.seg[0], B = hit.seg[1];
  const offsetLeft  = Math.hypot(hit.point.x-A.x, hit.point.y-A.y);   // distance ALONG host line to end A («слева»)
  const offsetRight = Math.hypot(hit.point.x-B.x, hit.point.y-B.y);   // distance ALONG host line to end B («справа»)
  return { host:{ kind:hit.kind, seg:[{x:A.x,y:A.y},{x:B.x,y:B.y}] }, point:{ x:hit.point.x, y:hit.point.y }, offsetLeft, offsetRight };
}

function partDrawPoint(){
  const a = activeApt(); if (!a) return { x:0, y:0 };
  let p = worldToLocal(a, screenToWorld(cursor));
  const ortho = state.ortho !== shiftHeld;            // ortho is relative to the apartment's own axes
  if (partDraft && partDraft.points.length && ortho){
    const last = partDraft.points[partDraft.points.length-1];
    if (Math.abs(p.x-last.x) >= Math.abs(p.y-last.y)) p = { x:p.x, y:last.y };
    else p = { x:last.x, y:p.y };
  }
  // [slice-3: snap] line snap to this apartment's own host lines (footprint walls + existing partitions), before grid.
  // Alt suppresses line AND grid snapping (ortho above still applies). One-shot: nothing is stored on the placed point.
  partSnap = altHeld ? null : findPartSnap(a, p);
  if (partSnap){ return { x: partSnap.point.x, y: partSnap.point.y }; }
  if (altHeld) return p;                               // Alt also skips grid
  const g = state.gridSnap;
  if (g) p = { x: Math.round(p.x/g)*g, y: Math.round(p.y/g)*g };
  return p;
}
function placePartPoint(){
  const a = activeApt(); if (!a || !a.closed) return;
  if (!partDraft || partDraft.aptId !== a.id){ pushUndo(); partDraft = { aptId:a.id, points:[] }; }  // [slice-6: undo] snapshot pre-draft; committed partition undoes whole
  const p = partDrawPoint();
  if (partDraft.points.length){
    const last = partDraft.points[partDraft.points.length-1];
    if (dist(worldToScreen(localToWorld(a, last)), worldToScreen(localToWorld(a, p))) < 6) return;   // ignore dup / dbl-click 2nd click
  }
  partDraft.points.push({ x:+p.x.toFixed(4), y:+p.y.toFixed(4) });
  commit();
}
// [slice-2: precision] exact length the partition rubber band currently represents (last point → live cursor)
function partExactRubberLen(){
  const a = activeApt();
  if (!a || !a.closed || !partDraft || partDraft.aptId !== a.id || !partDraft.points.length) return 0;
  return dist(partDraft.points[partDraft.points.length-1], partDrawPoint());
}
function placePartExactLength(L){
  const a = activeApt();
  if (!a || !a.closed || !(L>0) || !partDraft || partDraft.aptId !== a.id || !partDraft.points.length) return;
  const last = partDraft.points[partDraft.points.length-1], cur = partDrawPoint();
  let dx=cur.x-last.x, dy=cur.y-last.y, d=Math.hypot(dx,dy);
  if (d < 1e-9){ dx=1; dy=0; d=1; }
  partDraft.points.push({ x:+(last.x+dx/d*L).toFixed(4), y:+(last.y+dy/d*L).toFixed(4) });
  commit();
}
function commitDraft(){   // push a >=2-point draft into its apartment; drop anything shorter
  if (!partDraft) return;
  const a = state.apartments.find(x => x.id === partDraft.aptId);
  if (a && partDraft.points.length >= 2) (a.partitions || (a.partitions = [])).push({ points: partDraft.points });
  partDraft = null;
}
function finishPartition(){ commitDraft(); commit(); renderSidebar(); }
function undoPartPoint(){ if (!partDraft) return; partDraft.points.pop(); if (!partDraft.points.length) partDraft = null; commit(); }
function removePartition(id, i){ const a = state.apartments.find(x => x.id === id); if (!a || !a.partitions) return; pushUndo(); a.partitions.splice(i, 1); commit(); renderSidebar(); }  // [slice-6: undo]
function startPartition(id){ if (id && id !== state.activeId) state.activeId = id; setMode("partition"); renderSidebar(); }

// ============================== mouse / wheel ==============================
function svgPos(e){ const r = svg.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

function segDistScreen(p, a, b){
  const vx=b.x-a.x, vy=b.y-a.y, wx=p.x-a.x, wy=p.y-a.y;
  const c1=vx*wx+vy*wy; if (c1<=0) return Math.hypot(wx, wy);
  const c2=vx*vx+vy*vy; if (c2<=c1) return Math.hypot(p.x-b.x, p.y-b.y);
  const t=c1/c2; return Math.hypot(p.x-(a.x+t*vx), p.y-(a.y+t*vy));
}
// nearest wall under a screen point — prefers the ACTIVE apartment (plans overlap!), then topmost
function wallHitTest(s){
  const TH = 8;
  const tryApt = (a) => {
    if (!a || !a.visible || !a.closed || a.points.length < 3) return null;
    const n = a.points.length, scr = a.points.map(p => worldToScreen(localToWorld(a, p)));
    let best = null, bd = TH;
    for (let i=0;i<n;i++){ const d = segDistScreen(s, scr[i], scr[(i+1)%n]); if (d < bd){ bd = d; best = { id:a.id, k:i }; } }
    return best;
  };
  const act = tryApt(activeApt()); if (act) return act;
  for (let i = state.apartments.length-1; i >= 0; i--){ const h = tryApt(state.apartments[i]); if (h) return h; }
  return null;
}
// [slice-4: canvas-input] reusable on-canvas editor pinned at a screen point.
// onApply(value)/onCancel() are called with the raw string; the caller parses & applies.
// Enter calls e.preventDefault()+stopPropagation() so the window keydown can't ALSO fire
// (closePoly/finishPartition/arrows) — same double-action guard as #lenInput. blur applies.
const wallInputEl = document.getElementById("wallInput");
let canvasInputHandlers = null;            // {apply, cancel} for the currently-open input
function openCanvasInput({ x, y, value, width, onApply, onCancel }){
  closeCanvasInput();                       // never stack two editors
  wallInputEl.style.left = x + "px";
  wallInputEl.style.top  = y + "px";
  if (width) wallInputEl.style.width = width + "px";
  wallInputEl.value = value;
  wallInputEl.style.display = "block";
  let done = false;
  const finish = (fn) => { if (done) return; done = true; const v = wallInputEl.value; closeCanvasInput(); if (fn) fn(v); };
  canvasInputHandlers = {
    apply:  () => finish(onApply),
    cancel: () => finish(onCancel),
  };
  wallInputEl.focus(); wallInputEl.select();
}
function closeCanvasInput(){                 // hide the element + drop handlers (generic, idempotent)
  canvasInputHandlers = null;
  wallInputEl.style.display = "none";
}
// position of wall k's dimension label in screen px (same midpoint drawApartment labels use)
function wallLabelScreen(a, k){
  const n = a.points.length;
  const p1 = worldToScreen(localToWorld(a, a.points[k]));
  const p2 = worldToScreen(localToWorld(a, a.points[(k+1)%n]));
  return { x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2 };
}
wallInputEl.addEventListener("keydown", e => {
  if (e.key === "Enter"){ e.preventDefault(); e.stopPropagation(); if (canvasInputHandlers) canvasInputHandlers.apply(); }
  else if (e.key === "Escape"){ e.preventDefault(); e.stopPropagation(); if (canvasInputHandlers) canvasInputHandlers.cancel(); }
});
wallInputEl.addEventListener("blur", () => { if (canvasInputHandlers) canvasInputHandlers.apply(); });

// [slice-4: canvas-input] click a wall (select mode) → open a length input ON CANVAS at its
// dimension label. Enter/blur apply via setWallLength (rigid tail-shift + centroid pin), Esc
// cancels. Still selects the apartment; the sidebar accordion stays a synced read-through
// overview (no forced focus-into-sidebar). The closing wall (n-1) is «авто» — no input.
function editWallFromCanvas(hit){
  const a = state.apartments.find(x => x.id === hit.id); if (!a) return;
  if (state.activeId !== hit.id){ state.activeId = hit.id; renderSidebar(); }
  if (hit.k === a.points.length - 1) return;     // closing wall is derived/read-only — no editor
  const clearEdit = () => { wallInput = null; editWall = null; scheduleRender(); };  // slice-4 highlight/track state
  const mid = wallLabelScreen(a, hit.k);
  openCanvasInput({
    x: mid.x, y: mid.y, value: fmt(wallLen(a, hit.k)),
    onApply: (raw) => {
      clearEdit();
      const v = parseFloat(raw.replace(",", "."));
      if (setWallLength(a, hit.k, v)){ commit(); syncWalls(a); }   // REUSE: rigid tail-shift + centroid pin
    },
    onCancel: clearEdit,
  });
  wallInput = { id:hit.id, k:hit.k }; editWall = { id:hit.id, k:hit.k };  // set AFTER open() so its reset doesn't clobber
  scheduleRender();
}

svg.addEventListener("contextmenu", e => e.preventDefault());

svg.addEventListener("mousedown", e => {
  cursor = svgPos(e);
  // [slice-8: view] Space + left drag = pan in ANY mode (gate before the mode branches so no point/select happens)
  if (spaceHeld && e.button === 0){ drag = { type:"pan", last: cursor, moved:false, space:true }; return; }
  if (e.button === 2 || e.button === 1){ drag = { type:"pan", last: cursor }; return; }   // right/middle = pan
  if (state.mode === "select"){
    const wpt = screenToWorld(cursor);
    // a wall under the cursor wins over polygon reselection (active-preferred) — so clicking a
    // wall in an overlap stays on the active plan instead of jumping to the topmost one.
    const wallHit = wallHitTest(cursor);
    let hit = null;
    if (wallHit){ hit = state.apartments.find(a => a.id === wallHit.id); }
    else {
      for (let i = state.apartments.length-1; i >= 0; i--){
        const a = state.apartments[i];
        if (a.visible && a.closed && a.points.length >= 3 && pointInPoly(worldToLocal(a, wpt), a.points)){ hit = a; break; }
      }
    }
    if (hit){
      if (state.activeId !== hit.id){ state.activeId = hit.id; renderSidebar(); }
      beginGesture();   // [slice-6: undo] capture pre-drag; pushed once on mouseup if the plan actually moved
      drag = { type:"move", id:hit.id, startTx:hit.tx, startTy:hit.ty, startW:wpt, moved:false };
    } else drag = { type:"pan", last: cursor, fromEmpty:true, moved:false };
  }
});

window.addEventListener("mousemove", e => {
  const p = svgPos(e);
  if (drag){
    drag.moved = drag.moved || Math.hypot(p.x-cursor.x, p.y-cursor.y) > 3;
    if (drag.type === "pan"){ state.panX += p.x - drag.last.x; state.panY += p.y - drag.last.y; drag.last = p; }
    else if (drag.type === "move"){
      const a = state.apartments.find(x => x.id === drag.id); if (a){
        const w = screenToWorld(p);
        let tx = drag.startTx + (w.x - drag.startW.x), ty = drag.startTy + (w.y - drag.startW.y);
        if (state.gridSnap){ tx = Math.round(tx/state.gridSnap)*state.gridSnap; ty = Math.round(ty/state.gridSnap)*state.gridSnap; }
        a.tx = tx; a.ty = ty;
      }
    }
    cursor = p; scheduleRender();
    if (drag.type === "move") save();
    return;
  }
  cursor = p;
  if (state.mode === "draw" || state.mode === "partition") scheduleRender();   // live rubber band
});

window.addEventListener("mouseup", e => {
  if (drag){
    if (state.mode === "select" && drag.type === "pan" && drag.fromEmpty && !drag.moved){ state.activeId = null; renderSidebar(); }
    const wasMove = drag.moved, wasMoveDrag = drag.type === "move", wasSpace = drag.space; drag = null;
    if (wasMoveDrag) commitGesture();   // [slice-6: undo] one undo step per move-drag (no-op if it didn't move)
    if (wasMove || wasSpace){ suppressClick = true; }   // [slice-8: view] also suppress click after a space-pan with no movement
  }
});

let suppressClick = false;
svg.addEventListener("click", e => {
  if (suppressClick){ suppressClick = false; return; }
  if (e.button !== 0) return;
  cursor = svgPos(e);
  if (state.mode === "draw"){
    const a = activeApt();
    if (!a || a.closed) addApt();           // start a fresh apartment if needed
    placePoint(drawWorld());
    return;
  }
  if (state.mode === "partition"){ placePartPoint(); return; }
  // select mode: click a wall to edit its length
  const hit = wallHitTest(cursor);
  if (hit) editWallFromCanvas(hit);
});

svg.addEventListener("dblclick", () => { if (state.mode === "draw") closePoly(); else if (state.mode === "partition") finishPartition(); });

// [slice-8: view] zoom about a fixed screen point, keeping the world point under it stationary
function zoomBy(factor, centerScreenPt){
  const p = centerScreenPt || { x: stage.clientWidth/2, y: stage.clientHeight/2 };
  const before = screenToWorld(p);
  state.scale = Math.max(6, Math.min(400, state.scale * factor));
  state.panX = p.x - before.x * state.scale;
  state.panY = p.y - before.y * state.scale;
  commit();
}
// [slice-8: view] frame all visible apartments (footprints + partitions) with a margin
function fitAll(){
  const W = stage.clientWidth, H = stage.clientHeight;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, has = false;
  const acc = (p) => { if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y; if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y; has = true; };
  for (const a of state.apartments){
    if (!a.visible || !a.points.length) continue;
    for (const p of a.points) acc(localToWorld(a, p));
    for (const part of (a.partitions || [])) for (const p of part.points) acc(localToWorld(a, p));
  }
  if (!has) return;                                  // nothing visible — no-op
  const bw = Math.max(maxX - minX, 1e-3), bh = Math.max(maxY - minY, 1e-3);
  const pad = 0.10;                                  // 10% margin around the bbox
  let s = Math.min(W / (bw * (1 + 2*pad)), H / (bh * (1 + 2*pad)));
  if (!isFinite(s) || s <= 0) s = state.scale;
  state.scale = Math.max(6, Math.min(400, s));
  state.panX = W/2 - (minX + maxX)/2 * state.scale;  // center the bbox in the stage
  state.panY = H/2 - (minY + maxY)/2 * state.scale;
  commit();
}

svg.addEventListener("wheel", e => {
  e.preventDefault();
  zoomBy(e.deltaY < 0 ? 1.12 : 1/1.12, svgPos(e));   // [slice-8: view] factored into zoomBy
}, { passive: false });

// ============================== keyboard ==============================
window.addEventListener("keydown", e => {
  // [slice-8: view] Space = hold-to-pan, unless typing in a field (then it must type a space)
  if (e.code === "Space"){
    if (/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) return;   // let the space type
    if (!spaceHeld){ spaceHeld = true; stage.classList.add("spacepan"); }
    e.preventDefault();                                                              // stop page scroll
    return;
  }
  if (e.key === "Shift") shiftHeld = true;
  if (e.key === "Alt"){ altHeld = true; if (state.mode === "partition") scheduleRender(); }   // [slice-3: snap] Alt suppresses snapping
  // [slice-6: undo] Cmd/Ctrl+Z = undo, +Shift = redo. Cmd and Ctrl are equivalent.
  if ((e.metaKey || e.ctrlKey) && typeof e.key === "string" && e.key.toLowerCase() === "z"){
    const ae = document.activeElement;
    // text/length fields (name, lenInput, wall/rotation number inputs) keep NATIVE undo — do not intercept
    const inTextField = ae && ((ae.tagName === "INPUT" && /^(text|number|search|tel|url|email|password)$/i.test(ae.type)) || ae.tagName === "TEXTAREA");
    if (inTextField) return;            // [slice-6: undo] let the browser do native field undo (no preventDefault)
    if (e.shiftKey){ redo(); e.preventDefault(); return; }
    const da = activeApt();             // [slice-6: undo] during a draft, Ctrl+Z drops the last placed point (Esc-like)
    if (da && !da.closed && da.points.length){ undoPoint(); e.preventDefault(); return; }
    if (partDraft && partDraft.points.length){ undoPartPoint(); e.preventDefault(); return; }
    undo(); e.preventDefault(); return; // [slice-6: undo] otherwise step the data-history stack
  }
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName) && document.activeElement !== lenInput;
  if (typing) return;
  if (state.mode === "draw"){
    if (e.key === "Enter" && document.activeElement !== lenInput){ closePoly(); e.preventDefault(); }
    else if (e.key === "Escape"){ undoPoint(); }
  } else if (state.mode === "partition"){
    if (e.key === "Enter" && document.activeElement !== lenInput){ finishPartition(); e.preventDefault(); }
    else if (e.key === "Escape"){ undoPartPoint(); }
  } else {
    const a = activeApt();
    if (a && /^Arrow/.test(e.key)){
      if (!e.repeat) beginGesture();   // [slice-6: undo] coalesce a run/tap of arrow nudges into one undo step
      const g = state.gridSnap || 0.1;
      if (e.key === "ArrowLeft") a.tx -= g; if (e.key === "ArrowRight") a.tx += g;
      if (e.key === "ArrowUp") a.ty -= g; if (e.key === "ArrowDown") a.ty += g;
      commit(); e.preventDefault();
    }
  }
});
window.addEventListener("keyup", e => {
  if (e.key === "Shift"){ shiftHeld = false; if (state.mode==="draw") scheduleRender(); }
  if (e.key === "Alt"){ altHeld = false; if (state.mode === "partition") scheduleRender(); }   // [slice-3: snap]
  if (e.code === "Space"){ spaceHeld = false; stage.classList.remove("spacepan"); }   // [slice-8: view] release Space → restore mode behavior
  if (/^Arrow/.test(e.key)) commitGesture();   // [slice-6: undo] push the pre-nudge snapshot once the arrow run ends
});

lenInput.addEventListener("input", () => { lenInputDirty = true; });  // [slice-2: precision] real user edit makes the field the source of truth
lenInput.addEventListener("blur", () => { lenInputDirty = false; });  // [slice-2: precision] re-fill on next render; a stale edit must not survive defocus
lenInput.addEventListener("keydown", e => {
  if (e.key === "Enter"){
    // [slice-2: precision] if the user edited the field, honour the exact typed number;
    // otherwise place by the ACTUAL rubber-band length (the rounded display string is not the source of truth).
    if (state.mode === "partition"){
      const v = lenInputDirty ? parseFloat(lenInput.value.replace(",", ".")) : partExactRubberLen();
      placePartExactLength(v);
    } else {
      const v = lenInputDirty ? parseFloat(lenInput.value.replace(",", ".")) : drawExactRubberLen();
      placeExactLength(v);
    }
    lenInputDirty = false;
    // stop here: blur() below changes activeElement, which would otherwise let the window
    // keydown handler also fire closePoly()/finishPartition() — a double action.
    e.preventDefault(); e.stopPropagation(); lenInput.blur();
  }
});

// Три планировки по умолчанию — оцифрованы с реальных планов (исходники в spec/, локально).
// Контур — внутренние габариты наружных стен, поэтому площадь контура чуть больше паспортной
// (включает внутренние перегородки). Перегородки упрощены до основных стен, двери не моделируются.
function defaultPlans(){
  return [
    { name:"Набережная", opacity:0.30,       // 3к ~64 м²: кухня 8.8, комнаты 19.4 / 14.1 / 11.0
      points:[ {x:0,y:0},{x:9.45,y:0},{x:9.45,y:6.85},{x:0,y:6.85} ],
      partitions:[
        [ {x:1.82,y:0},{x:1.82,y:2.99} ],       // санузел | кухня
        [ {x:0,y:1.83},{x:1.82,y:1.83} ],       // ванная 3.3 | туалет 1.9
        [ {x:0,y:2.99},{x:2.92,y:2.99} ],       // санузел | комната 11.0
        [ {x:1.82,y:2.12},{x:5.94,y:2.12} ],    // кухня 8.8 | комната 14.1

function loadExample(){
  idc = 0;
  state.apartments = defaultPlans().map((d, i) => ({
    id:"a"+(++idc), name:d.name, color:PALETTE[i % PALETTE.length], visible:true, opacity:d.opacity,
    closed:true, tx:0, ty:0, rot:0, points:d.points, partitions:d.partitions.map(p => ({ points:p })) }));
  state.activeId = state.apartments[0].id;
  state.scale = 42; state.panX = 90; state.panY = 70;
  setMode("select"); commit(); renderSidebar();
}

// ============================== init ==============================
function syncControls(){ snapSel.value = String(state.gridSnap); orthoChk.checked = state.ortho; labelChk.checked = state.showAll; }
function init(){
  const had = load();
  if (!had) loadExample();                 // первый запуск — три планировки по умолчанию
  syncControls(); setMode(state.mode); renderSidebar(); render();
  window.addEventListener("resize", scheduleRender);
}
init();
